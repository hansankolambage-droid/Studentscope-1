<section class="section">
  <h2 class="heading">
    <i class="fas fa-user-tie"></i>
    <span data="admin.clerks.title">Clerk Management</span>
  </h2>

  <div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
      <div class="icon-title">
        <i class="fas fa-users icon"></i>
        <p class="tile-label" data="admin.clerks.clerks">Clerks</p>
      </div>
      <button class="btn btn-primary" onclick="openAddModal()">
        <i class="fas fa-plus"></i> <span data="admin.clerks.addClerk">Add Clerk</span>
      </button>
    </div>

    <data-table id="clerks-table"></data-table>
  </div>
</section>

<link rel="stylesheet" href="../../css/dropdown.css" />

<modal-dialog id="clerkModal" title="admin.clerks.addClerk">
  <form id="clerkForm" onsubmit="saveClerk(event)">
    <input type="hidden" id="clerkId" value="">
    <div class="form-group">
      <label for="fullName" data="admin.clerks.fullName">Full Name <span class="required">*</span></label>
      <input type="text" id="fullName" required>
    </div>
    <div class="form-group">
      <label for="nic" data="admin.clerks.nic">NIC (Username) </label>      
      <input type="text" id="nic" required oninput="validateNic()">
      <span id="nicFeedback" class="form-hint"></span>
      <small class="form-hint" data="admin.clerks.nicHint">NIC will be used as username and default password</small>
    </div>
    <div class="form-group">
      <label for="phoneNumber" data="admin.clerks.phone">Phone Number</label>
      <input type="text" id="phoneNumber">
    </div>
    <div class="form-group">
      <label for="address" data="admin.clerks.address">Address</label>
      <input type="text" id="address">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="birthday" data="admin.clerks.birthday">Birthday</label>
        <input type="date" id="birthday">
      </div>
      <div class="form-group">
        <label for="appointmentDate" data="admin.clerks.appointmentDate">Appointment Date</label>
        <input type="date" id="appointmentDate">
      </div>
    </div>
    <div class="form-group">
      <label for="firstAppointmentDate" data="admin.clerks.firstAppointmentDate">First Appointment Date</label>
      <input type="date" id="firstAppointmentDate">
    </div>
    <div class="modal-actions">
      <button type="button" class="btn btn-secondary" onclick="closeClerkModal()">
        <span data="common.cancel">Cancel</span>
      </button>
      <button type="submit" class="btn btn-primary">
        <span data="common.save">Save</span>
      </button>
    </div>
  </form>
</modal-dialog>

<modal-dialog id="passwordModal" title="admin.clerks.resetPassword">
  <form id="passwordForm" onsubmit="resetPassword(event)">
    <input type="hidden" id="passwordClerkId" value="">
    <div class="form-group">
      <label for="newPassword" data="admin.clerks.newPassword">New Password <span class="required">*</span></label>
      <input type="password" id="newPassword" required minlength="4">
    </div>
    <div class="form-group">
      <label for="confirmPassword" data="admin.clerks.confirmPassword">Confirm Password <span class="required">*</span></label>
      <input type="password" id="confirmPassword" required minlength="4">
    </div>
    <div class="modal-actions">
      <button type="button" class="btn btn-secondary" onclick="closePasswordModal()">
        <span data="common.cancel">Cancel</span>
      </button>
      <button type="submit" class="btn btn-primary">
        <span data="admin.clerks.resetPassword">Reset Password</span>
      </button>
    </div>
  </form>
</modal-dialog>

<modal-dialog id="deleteModal" title="common.delete">
  <div style="padding: 16px 0;">
    <p data="admin.clerks.deleteConfirm">Are you sure you want to delete this clerk? This action cannot be undone.</p>
    <p id="deleteClerkName" style="font-weight: 600; margin-top: 8px;"></p>
  </div>
  <input type="hidden" id="deleteClerkId" value="">
  <div class="modal-actions">
    <button class="btn btn-secondary" onclick="closeDeleteModal()">
      <span data="common.cancel">Cancel</span>
    </button>
    <button class="btn btn-danger" onclick="confirmDelete()">
      <i class="fas fa-trash"></i> <span data="common.delete">Delete</span>
    </button>
  </div>
</modal-dialog>

<style>
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; margin-bottom: 6px; font-weight: 500; }
  .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 8px 12px; border: 1px solid var(--color-border); border-radius: 6px; font-size: 14px; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--color-primary); }
  .form-hint { display: block; margin-top: 4px; font-size: 12px; color: var(--color-subtext); }
  .required { color: #e74c3c; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--color-border); }
  .action-buttons { display: flex; gap: 6px; }
  @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }
</style>

<script>
  let allClerks = [];

  function validateNic() {
  const value = document.getElementById("nic").value;
  const feedback = document.getElementById("nicFeedback");
  // Old NIC: 9 digits + V/v/X/x, New NIC: 12 digits
  const valid = /^(\d{9}[vVxX]|\d{12})$/.test(value);
  if (value === "") {
    feedback.textContent = "";
    feedback.style.color = "";
    return true;
  }
  if (valid) {
    feedback.textContent = "Valid NIC";
    feedback.style.color = "green";
    return true;
  } else {
    feedback.textContent = "NIC must be 9 digits + V/X or 12 digits (e.g., 123456789V or 200012345678)";
    feedback.style.color = "red";
    return false;
  }
}

  function initTable() {
    const table = document.getElementById("clerks-table");
    table.setColumns([
      { key: "full_name", header: t("admin.clerks.fullName"), searchable: true },
      { key: "nic", header: t("admin.clerks.nic"), searchable: true },
      { key: "phone_number", header: t("admin.clerks.phone"), searchable: false },
      { 
        key: "appointment_date", 
        header: t("admin.clerks.appointmentDate"),
        render: (row) => row.appointment_date ? new Date(row.appointment_date).toLocaleDateString() : "—"
      },
      {
        key: "actions",
        header: t("common.actions"),
        render: (row) => {
          const div = document.createElement("div");
          div.className = "action-buttons";
          div.innerHTML = `
            <button class="btn btn-small btn-secondary" onclick="openEditModal(${row.id})" title="${t("common.edit")}">
              <i class="fas fa-edit"></i>
            </button>
            <button class="btn btn-small btn-primary" onclick="openPasswordModal(${row.id})" title="${t("admin.clerks.resetPassword")}">
              <i class="fas fa-key"></i>
            </button>
            <button class="btn btn-small btn-danger" onclick="openDeleteModal(${row.id}, '${row.full_name.replace(/'/g, "\\'")}')" title="${t("common.delete")}">
              <i class="fas fa-trash"></i>
            </button>
          `;
          return div;
        }
      }
    ]);
    table.setEmptyState(t("admin.clerks.noClerksFound"), "fas fa-user-tie");
  }

  function loadClerks() {
    api.admin.clerks.getAll()
      .then(res => {
        if (!res.ok) throw new Error("Failed to fetch clerks");
        return res.json();
      })
      .then(data => {
        allClerks = data.data || data;
        document.getElementById("clerks-table").setData(allClerks);
      })
      .catch(err => {
        console.error(err);
        toast(t("admin.clerks.loadError"), "fa-solid fa-circle-exclamation");
      });
  }

  function openAddModal() {
    document.getElementById("clerkForm").reset();
    document.getElementById("clerkId").value = "";
    document.getElementById("clerkModal").setTitle(t("admin.clerks.addClerk"));
    document.getElementById("clerkModal").open();
  }

  function openEditModal(id) {
    const clerk = allClerks.find(c => c.id === parseInt(id) || c.id === String(id));
    if (!clerk) return;

    document.getElementById("clerkId").value = clerk.id;
    document.getElementById("fullName").value = clerk.full_name || "";
    document.getElementById("nic").value = clerk.nic || "";
    document.getElementById("phoneNumber").value = clerk.phone_number || "";
    document.getElementById("address").value = clerk.address || "";
    document.getElementById("birthday").value = clerk.birthday ? new Date(clerk.birthday).toISOString().split("T")[0] : "";
    document.getElementById("appointmentDate").value = clerk.appointment_date ? new Date(clerk.appointment_date).toISOString().split("T")[0] : "";
    document.getElementById("firstAppointmentDate").value = clerk.first_appointment_date ? new Date(clerk.first_appointment_date).toISOString().split("T")[0] : "";

    document.getElementById("clerkModal").setTitle(t("admin.clerks.editClerk"));
    document.getElementById("clerkModal").open();
  }

  function closeClerkModal() {
    document.getElementById("clerkModal").close();
  }

  async function saveClerk(e) {
    e.preventDefault();
if (!validateNic()) {
  toast("Please enter valid NIC.", "fa-solid fa-circle-exclamation");
  return;
}
    const id = document.getElementById("clerkId").value;
    const data = {
      full_name: document.getElementById("fullName").value,
      nic: document.getElementById("nic").value,
      phone_number: document.getElementById("phoneNumber").value,
      address: document.getElementById("address").value,
      birthday: document.getElementById("birthday").value,
      appointment_date: document.getElementById("appointmentDate").value,
      first_appointment_date: document.getElementById("firstAppointmentDate").value,
    };

    try {
      const res = id 
        ? await api.admin.clerks.update(parseInt(id), data)
        : await api.admin.clerks.create(data);
      
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error || "Failed to save clerk");
      }

      toast(t("admin.clerks.saveSuccess"), "fa-solid fa-check");
      closeClerkModal();
      loadClerks();
    } catch (err) {
      console.error(err);
      toast(err.message || t("admin.clerks.saveError"), "fa-solid fa-circle-exclamation");
    }
  }

  function openPasswordModal(id) {
    document.getElementById("passwordForm").reset();
    document.getElementById("passwordClerkId").value = parseInt(id) || id;
    document.getElementById("passwordModal").open();
  }

  function closePasswordModal() {
    document.getElementById("passwordModal").close();
  }

  async function resetPassword(e) {
    e.preventDefault();
    const id = document.getElementById("passwordClerkId").value;
    const newPass = document.getElementById("newPassword").value;
    const confirmPass = document.getElementById("confirmPassword").value;

    if (newPass !== confirmPass) {
      toast(t("admin.clerks.passwordMismatch"), "fa-solid fa-circle-exclamation");
      return;
    }

    try {
      const res = await api.admin.clerks.resetPassword(parseInt(id), newPass);
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error || "Failed to reset password");
      }
      toast(t("admin.clerks.passwordResetSuccess"), "fa-solid fa-check");
      closePasswordModal();
    } catch (err) {
      console.error(err);
      toast(err.message || t("admin.clerks.passwordResetError"), "fa-solid fa-circle-exclamation");
    }
  }

  function openDeleteModal(id, name) {
    document.getElementById("deleteClerkId").value = parseInt(id) || id;
    document.getElementById("deleteClerkName").textContent = name;
    document.getElementById("deleteModal").open();
  }

  function closeDeleteModal() {
    document.getElementById("deleteModal").close();
  }

  async function confirmDelete() {
    const id = document.getElementById("deleteClerkId").value;
    try {
      const res = await api.admin.clerks.delete(parseInt(id));
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error || "Failed to delete clerk");
      }
      toast(t("admin.clerks.deleteSuccess"), "fa-solid fa-check");
      closeDeleteModal();
      loadClerks();
    } catch (err) {
      console.error(err);
      toast(err.message || t("admin.clerks.deleteError"), "fa-solid fa-circle-exclamation");
    }
  }

  function refreshTranslations() {
    if (typeof applyTranslations === 'function') {
      applyTranslations();
    }
    initTable();
  }

  window.addEventListener("languageChanged", refreshTranslations);

  initTable();
  loadClerks();
</script>
